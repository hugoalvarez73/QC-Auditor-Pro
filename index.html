<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC Auditor Pro - Mobile</title>
    <style>
        :root { --primary: #004a99; --secondary: #f8f9fa; --accent: #ffc107; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #e9ecef; margin: 0; padding: 15px; }
        .app-container { max-width: 500px; margin: auto; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; }
        .input-group { margin-bottom: 15px; }
        label { font-weight: bold; color: #333; display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .scan-btn { background: var(--accent); color: black; border: none; padding: 10px; border-radius: 8px; font-weight: bold; margin-bottom: 10px; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .submit-btn { background: #28a745; color: white; border: none; padding: 18px; border-radius: 8px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>QC Auditor Pro</h1>
        <p>Channell Commercial Corp - Quality Dept</p>
    </div>
    <div class="content">
        <div class="input-group">
            <label>Date & Shift</label>
            <div style="display: flex; gap: 10px;">
                <input type="date" id="date">
                <select id="shift"><option>1st</option><option>2nd</option><option>3rd</option></select>
            </div>
        </div>
        <div class="input-group">
            <label>Work Order / Job #</label>
            <button class="scan-btn">📷 SCAN BARCODE</button>
            <input type="text" id="job" placeholder="Scan or type WO#">
        </div>
        <div class="input-group">
            <label>Machine / Press #</label>
            <input type="text" id="machine" placeholder="e.g. Press 04">
        </div>
        <div class="input-group">
            <label>Part Information</label>
            <input type="text" id="partName" placeholder="Part Name (e.g. G6 Dome)">
            <input type="text" id="partNum" placeholder="Part Number (P/N)" style="margin-top: 5px;">
        </div>
        <div class="input-group">
            <label>Tool Status</label>
            <select id="status" style="border-left: 10px solid #28a745;">
                <option value="UP">✅ UP - Running Normal</option>
                <option value="DOWN">❌ DOWN - Defect Found</option>
            </select>
        </div>
        <div class="input-group">
            <label>Defect Notes & Photos</label>
            <textarea id="notes" rows="2" placeholder="Explain issues here..."></textarea>
            <input type="file" accept="image/*" capture="environment" style="margin-top: 5px; border: none;">
        </div>
        <button class="submit-btn" onclick="alert('Sending to Hugo...')">🚀 SUBMIT TO QUALITY DEPT</button>
    </div>
</div>
<script>document.getElementById('date').valueAsDate = new Date();</script>
</body>
</html>
