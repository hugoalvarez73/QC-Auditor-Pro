<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC Auditor Pro - AI Edition</title>
    <style>
        :root { --primary: #004a99; --secondary: #f8f9fa; --accent: #76B041; --gold: #ffc107; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f7f4; margin: 0; padding: 10px; }
        .app-container { max-width: 500px; margin: auto; background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #e2f0d9; }
        .header { background: var(--primary); color: white; padding: 25px 20px; text-align: center; border-bottom: 5px solid var(--accent); }
        .content { padding: 20px; }
        label { font-size: 11px; font-weight: 900; color: #abbac6; text-transform: uppercase; letter-spacing: 1px; margin-left: 5px; }
        input, select, textarea { width: 100%; padding: 15px; margin: 5px 0 15px 0; border: 2px solid #f0f2f5; border-radius: 15px; font-size: 16px; box-sizing: border-box; background: #f9fbff; font-weight: bold; }
        .ai-btn { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 15px; font-weight: 900; width: 100%; margin-bottom: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 0 #d9a406; }
        .submit-btn { background: var(--accent); color: white; border: none; padding: 20px; border-radius: 15px; font-size: 18px; font-weight: 900; width: 100%; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 0 #5e8d34; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1 style="margin:0; font-style: italic;">QC AUDITOR <span style="color:var(--accent)">PRO</span></h1>
        <p style="margin:5px 0 0 0; opacity: 0.8; font-size: 12px; font-weight: bold;">CHANNELL COMMERCIAL CORP</p>
    </div>
    <div class="content">
        <label>Auditor Name</label>
        <input type="text" id="name" placeholder="Who is auditing?">

        <label>Department</label>
        <select id="dept">
            <option>Injection Molding</option>
            <option>Fiber</option>
            <option>Metals</option>
            <option>SMC</option>
        </select>

        <button class="ai-btn" onclick="alert('AI Scanner is ready. Once connected, it will auto-fill the boxes below!')">
            📷 AUTO-SCAN WORK ORDER
        </button>

        <label>Job / Work Order #</label>
        <input type="text" id="job" placeholder="Scanning will fill this...">

        <label>Part Name & P/N</label>
        <input type="text" id="part" placeholder="e.g. G6 Dome - 12345">

        <button class="submit-btn" onclick="sendEmail()">🚀 SUBMIT & EMAIL HUGO</button>
    </div>
</div>

<script>
    function sendEmail() {
        const name = document.getElementById('name').value;
        const job = document.getElementById('job').value;
        const dept = document.getElementById('dept').value;
        const body = `QC Audit Submitted by: ${name}\nDept: ${dept}\nJob #: ${job}\n\nSent from QC Auditor Pro`;
        window.location.href = `mailto:hugoalvarez73@gmail.com?subject=QC Audit: Job ${job}&body=${encodeURIComponent(body)}`;
    }
</script>
</body>
</html>
